<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Placar de Pontos</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');
    
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Outfit', system-ui, sans-serif; }
    
    .root {
      --p:#8B5CF6; --p-br:#A78BFA; --p-lt:#C4B5FD; --p-dk:#6D28D9;
      --bg1:#1A1036; --bg2:#0F0A20; --surf:#241838; --surf2:#2E2046; --raised:#382A55;
      --bd:rgba(167,139,250,0.16); --bd-soft:rgba(255,255,255,0.07);
      --tx:#FFFFFF; --mut:#B9B2D0; --faint:#8A82A3;
      --gold:#FFD43B; --gold-bg:rgba(255,212,59,0.14); --gold-bd:rgba(255,212,59,0.5);
      --silver:#D6DBE3; --silver-bg:rgba(214,219,227,0.12); --silver-bd:rgba(214,219,227,0.45);
      --bronze:#D08B5B; --bronze-bg:rgba(208,139,91,0.14); --bronze-bd:rgba(208,139,91,0.5);
      --danger:#F0816A;
      min-height: 100vh; color: var(--tx);
      background: radial-gradient(1100px 500px at 50% -10%, rgba(139,92,246,0.18), transparent 60%), linear-gradient(180deg, var(--bg1), var(--bg2));
      padding: 20px 16px 56px;
    }
    .wrap { max-width: 680px; margin: 0 auto; }
    .banner { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 14px; border-radius: 14px; margin-bottom: 24px; font-size: 14px; flex-wrap: wrap; }
    .banner.view { background: rgba(255,255,255,0.05); border: 1px solid var(--bd-soft); color: var(--mut); }
    .banner.adm { background: linear-gradient(90deg, rgba(139,92,246,0.22), rgba(139,92,246,0.08)); border: 1px solid var(--bd); }
    .banner-l { display: flex; align-items: center; gap: 9px; }
    .banner-l strong { color: var(--tx); font-weight: 600; }
    .banner-btn { display: flex; align-items: center; gap: 7px; background: var(--p); color: #fff; border: none; border-radius: 10px; padding: 9px 14px; font-family: 'Outfit'; font-weight: 600; font-size: 13px; cursor: pointer; white-space: nowrap; }
    .banner-btn:hover { filter: brightness(1.1); }
    .head { margin-bottom: 22px; }
    .eyebrow { display: flex; align-items: center; gap: 7px; font-size: 11px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: var(--p-br); }
    .title { font-family: 'Outfit'; font-weight: 800; font-size: clamp(32px, 9vw, 48px); margin: 10px 0 0; color: var(--tx); cursor: default; }
    .title.edit { cursor: pointer; }
    .stats { display: flex; gap: 10px; margin-bottom: 22px; flex-wrap: wrap; }
    .stat { flex: 1; min-width: 100px; background: var(--surf); border: 1px solid var(--bd-soft); border-radius: 14px; padding: 12px 14px; }
    .stat-l { display: flex; align-items: center; gap: 6px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--mut); }
    .stat-v { font-family: 'JetBrains Mono'; font-weight: 700; font-size: 24px; margin-top: 5px; }
    .stat.lead .stat-v { color: var(--gold); }
    .add { display: flex; gap: 10px; flex-wrap: wrap; background: var(--surf); border: 1px solid var(--bd); border-radius: 16px; padding: 12px; margin-bottom: 18px; }
    .in { background: var(--bg2); border: 1px solid var(--bd-soft); border-radius: 11px; padding: 13px 14px; color: var(--tx); font-family: 'Outfit'; font-size: 16px; outline: none; }
    .in:focus { border-color: var(--p); box-shadow: 0 0 0 3px rgba(139,92,246,0.18); }
    .in.name { flex: 1; min-width: 160px; }
    .in.pts { width: 84px; text-align: center; font-family: 'JetBrains Mono'; }
    .btn-primary { display: flex; align-items: center; gap: 7px; background: linear-gradient(180deg, var(--p-br), var(--p)); color: #fff; border: none; border-radius: 11px; padding: 13px 18px; font-family: 'Outfit'; font-weight: 700; cursor: pointer; }
    .btn-primary:hover { filter: brightness(1.08); }
    .empty { text-align: center; padding: 46px 20px; border: 1px dashed var(--bd-soft); border-radius: 16px; color: var(--mut); }
    .list { display: flex; flex-direction: column; gap: 10px; }
    .card { background: var(--surf); border: 1px solid var(--bd-soft); border-radius: 16px; padding: 13px 14px; animation: up .42s ease both; }
    .card.gold { border-color: var(--gold-bd); background: linear-gradient(180deg, var(--gold-bg), transparent), var(--surf); }
    .card.silver { border-color: var(--silver-bd); background: linear-gradient(180deg, var(--silver-bg), transparent), var(--surf); }
    .card.bronze { border-color: var(--bronze-bd); background: linear-gradient(180deg, var(--bronze-bg), transparent), var(--surf); }
    .card-top { display: flex; align-items: center; gap: 12px; }
    .rank { width: 40px; height: 40px; flex: none; border-radius: 12px; display: flex; align-items: center; justify-content: center; background: var(--raised); color: var(--mut); font-family: 'JetBrains Mono'; font-weight: 700; }
    .rank.gold { background: var(--gold-bg); color: var(--gold); font-size: 20px; }
    .rank.silver { background: var(--silver-bg); color: var(--silver); font-size: 20px; }
    .rank.bronze { background: var(--bronze-bg); color: var(--bronze); font-size: 20px; }
    .pname { flex: 1; font-size: 18px; font-weight: 600; color: var(--tx); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pname.edit { cursor: pointer; }
    .score { font-family: 'JetBrains Mono'; font-weight: 700; font-size: 30px; color: var(--tx); min-width: 50px; text-align: right; }
    .score.gold { color: var(--gold); }
    .score.silver { color: var(--silver); }
    .score.bronze { color: var(--bronze); }
    .del { width: 34px; height: 34px; border-radius: 9px; background: transparent; border: none; color: var(--faint); cursor: pointer; }
    .del:hover { color: var(--danger); }
    .card-bot { display: flex; align-items: center; justify-content: center; gap: clamp(20px, 8vw, 48px); margin-top: 13px; padding-top: 13px; border-top: 1px solid var(--bd-soft); }
    .step { width: 50px; height: 50px; border-radius: 14px; border: 1px solid var(--bd-soft); background: var(--raised); color: var(--tx); cursor: pointer; font-size: 20px; }
    .step:hover { background: var(--surf2); }
    .controls { margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--bd-soft); display: flex; flex-wrap: wrap; gap: 12px; }
    .chip { background: var(--surf); border: 1px solid var(--bd-soft); color: var(--mut); border-radius: 9px; padding: 8px 13px; font-family: 'JetBrains Mono'; cursor: pointer; }
    .chip.on { background: rgba(139,92,246,0.18); border-color: var(--p); color: var(--p-lt); }
    .ctrl-btn { background: var(--surf); border: 1px solid var(--bd-soft); color: var(--mut); border-radius: 9px; padding: 9px 13px; font-family: 'Outfit'; cursor: pointer; }
    .ctrl-btn:hover { color: var(--tx); }
    .share { margin-top: 28px; padding: 15px 16px; background: rgba(139,92,246,0.1); border-left: 3px solid var(--p); border-radius: 10px; font-size: 13px; color: var(--mut); }
    .overlay { position: fixed; inset: 0; background: rgba(8,4,18,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    .modal { background: var(--surf2); border: 1px solid var(--bd); border-radius: 20px; padding: 28px 24px; max-width: 360px; width: 100%; text-align: center; }
    .modal h2 { font-family: 'Outfit'; font-weight: 700; font-size: 22px; color: var(--tx); margin: 0 0 6px; }
    .modal-in { width: 100%; background: var(--bg2); border: 1px solid var(--bd-soft); border-radius: 11px; padding: 13px 14px; color: var(--tx); font-family: 'Outfit'; outline: none; margin-bottom: 12px; }
    .modal-actions { display: flex; flex-direction: column; gap: 9px; margin-top: 6px; }
    .btn-ghost { background: transparent; border: 1px solid var(--bd-soft); color: var(--mut); border-radius: 11px; padding: 12px; font-family: 'Outfit'; cursor: pointer; }
    @keyframes up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script>
    const { useState, useEffect, useRef } = React;
    
    const DATA_KEY = "placar-roxo:data";
    const SETTINGS_KEY = "placar-roxo:settings";
    const DEFAULT_PIN = "20091621";
    const newId = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);

    function App() {
      const [title, setTitle] = useState("Placar de Pontos");
      const [users, setUsers] = useState([]);
      const [step, setStep] = useState(1);
      const [loaded, setLoaded] = useState(false);
      const [pin, setPin] = useState(DEFAULT_PIN);
      const [unlocked, setUnlocked] = useState(false);
      const [showLogin, setShowLogin] = useState(false);
      const [loginInput, setLoginInput] = useState("");
      const [loginError, setLoginError] = useState(false);
      const [showSettings, setShowSettings] = useState(false);
      const [newPinInput, setNewPinInput] = useState("");
      const [newPinConfirm, setNewPinConfirm] = useState("");
      const [newName, setNewName] = useState("");
      const [newPoints, setNewPoints] = useState("");
      const [editingId, setEditingId] = useState(null);
      const [editingValue, setEditingValue] = useState("");
      const [renamingId, setRenamingId] = useState(null);
      const [renameValue, setRenameValue] = useState("");
      const [confirmDelete, setConfirmDelete] = useState(null);
      const [confirmReset, setConfirmReset] = useState(false);
      
      const nameRef = useRef(null);
      const hasStorage = typeof window !== "undefined" && window.storage;

      useEffect(() => {
        (async () => {
          if (hasStorage) {
            try { const s = await window.storage.get(SETTINGS_KEY, true); if (s && s.value) { const d = JSON.parse(s.value); if (d.pin) setPin(d.pin); } } catch (e) {}
            try {
              const r = await window.storage.get(DATA_KEY, true);
              if (r && r.value) { const d = JSON.parse(r.value); if (Array.isArray(d.users)) setUsers(d.users); if (typeof d.step === "number") setStep(d.step); if (typeof d.title === "string") setTitle(d.title); }
            } catch (e) {}
          }
          setLoaded(true);
        })();
      }, []);

      useEffect(() => {
        if (!loaded || !hasStorage) return;
        (async () => { try { await window.storage.set(DATA_KEY, JSON.stringify({ users, step, title }), true); } catch (e) {} })();
      }, [users, step, title, loaded]);

      const total = users.reduce((a, u) => a + u.points, 0);
      const ranked = [...users].sort((a, b) => b.points - a.points || a.name.localeCompare(b.name));
      const rankMap = {};
      ranked.forEach((u, i) => (rankMap[u.id] = i + 1));
      const leader = ranked[0] && ranked[0].points > 0 ? ranked[0] : null;
      const medal = (u) => { if (!(u.points > 0)) return ""; const r = rankMap[u.id]; return r === 1 ? "gold" : r === 2 ? "silver" : r === 3 ? "bronze" : ""; };

      function addUser() { const n = newName.trim(); if (!n) { if (nameRef.current) nameRef.current.focus(); return; } const p = parseInt(newPoints, 10); setUsers((u) => [...u, { id: newId(), name: n, points: isNaN(p) ? 0 : p }]); setNewName(""); setNewPoints(""); if (nameRef.current) nameRef.current.focus(); }
      function change(id, d) { setUsers((us) => us.map((u) => u.id === id ? { ...u, points: u.points + d } : u)); }
      function startScore(u) { setEditingId(u.id); setEditingValue(String(u.points)); }
      function commitScore(id) { const v = parseInt(editingValue, 10); setUsers((us) => us.map((u) => u.id === id ? { ...u, points: isNaN(v) ? 0 : v } : u)); setEditingId(null); }
      function startRename(u) { setRenamingId(u.id); setRenameValue(u.name); }
      function commitRename(id) { const n = renameValue.trim(); setUsers((us) => us.map((u) => u.id === id ? { ...u, name: n || u.name } : u)); setRenamingId(null); }
      function remove(id) { setUsers((us) => us.filter((u) => u.id !== id)); setConfirmDelete(null); }
      function reset() { setUsers([]); setConfirmReset(false); }
      function tryLogin() { if (loginInput === pin) { setUnlocked(true); setShowLogin(false); setLoginInput(""); setLoginError(false); } else { setLoginError(true); setLoginInput(""); } }
      function saveNewPin() { if (!newPinInput || newPinInput !== newPinConfirm) return; (async () => { if (hasStorage) { try { await window.storage.set(SETTINGS_KEY, JSON.stringify({ pin: newPinInput }), true); } catch (e) {} } setPin(newPinInput); setNewPinInput(""); setNewPinConfirm(""); setShowSettings(false); })(); }

      if (!loaded) return React.createElement("div", { style: { display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh", color: "#fff", background: "#150E2B" } }, "Carregando…");

      return React.createElement("div", { className: "root" },
        React.createElement("div", { className: "wrap" },
          React.createElement("div", { className: "banner " + (unlocked ? "adm" : "view") },
            React.createElement("div", { className: "banner-l" },
              React.createElement("span", null, unlocked ? "🔓 " : "👁 "),
              React.createElement("span", null, React.createElement("strong", null, unlocked ? "Modo ADM" : "Somente leitura"), " — ", unlocked ? "você pode editar" : "entre como ADM para editar")
            ),
            React.createElement("button", { className: "banner-btn", onClick: () => unlocked ? setUnlocked(false) : setShowLogin(true) }, unlocked ? "🔒 Sair" : "🔓 Entrar como ADM")
          ),
          React.createElement("div", { className: "head" },
            React.createElement("div", { className: "eyebrow" }, "🏆 PLACAR"),
            React.createElement("h1", { className: "title" }, title)
          ),
          React.createElement("div", { className: "stats" },
            React.createElement("div", { className: "stat" }, React.createElement("div", { className: "stat-l" }, "👥 Participantes"), React.createElement("div", { className: "stat-v" }, users.length)),
            React.createElement("div", { className: "stat" }, React.createElement("div", { className: "stat-l" }, "⭐ Total de pontos"), React.createElement("div", { className: "stat-v" }, total)),
            React.createElement("div", { className: "stat lead" }, React.createElement("div", { className: "stat-l" }, "👑 Líder"), React.createElement("div", { className: "stat-v" }, leader ? leader.name : "—"))
          ),
          unlocked && React.createElement("div", { className: "add" },
            React.createElement("input", { ref: nameRef, className: "in name", placeholder: "Nome", value: newName, maxLength: 40, onChange: (e) => setNewName(e.target.value), onKeyDown: (e) => e.key === "Enter" && addUser() }),
            React.createElement("input", { className: "in pts", type: "number", placeholder: "0", value: newPoints, onChange: (e) => setNewPoints(e.target.value), onKeyDown: (e) => e.key === "Enter" && addUser() }),
            React.createElement("button", { className: "btn-primary", onClick: addUser }, "➕ Add")
          ),
          ranked.length === 0 ? React.createElement("div", { className: "empty" }, React.createElement("div", { style: { fontSize: "36px", marginBottom: "10px" } }, "👥"), React.createElement("h3", null, "Nenhum participante"), React.createElement("p", null, unlocked ? "Adicione acima" : "Entre como ADM")) :
          React.createElement("div", { className: "list" },
            ranked.map((u, i) => React.createElement("div", { key: u.id, className: "card " + medal(u) },
              React.createElement("div", { className: "card-top" },
                React.createElement("div", { className: "rank " + medal(u) }, medal(u) === "gold" ? "🥇" : medal(u) === "silver" ? "🥈" : medal(u) === "bronze" ? "🥉" : rankMap[u.id]),
                React.createElement("div", { className: "pname " + (unlocked ? "edit" : ""), onClick: () => unlocked && startRename(u) }, renamingId === u.id ? React.createElement("input", { className: "in", value: renameValue, autoFocus: true, onChange: (e) => setRenameValue(e.target.value), onBlur: () => commitRename(u.id) }) : u.name),
                !unlocked && React.createElement("span", { className: "score " + medal(u) }, u.points),
                unlocked && (confirmDelete === u.id ? React.createElement("button", { className: "del", onClick: () => remove(u.id) }, "✅") : React.createElement("button", { className: "del", onClick: () => setConfirmDelete(u.id) }, "❌"))
              ),
              unlocked && React.createElement("div", { className: "card-bot" },
                React.createElement("button", { className: "step", onClick: () => change(u.id, -step) }, "−"),
                editingId === u.id ? React.createElement("input", { className: "in pts", type: "number", value: editingValue, autoFocus: true, onChange: (e) => setEditingValue(e.target.value), onBlur: () => commitScore(u.id) }) : React.createElement("span", { className: "score " + medal(u), onClick: () => startScore(u) }, u.points),
                React.createElement("button", { className: "step", onClick: () => change(u.id, step) }, "+")
              )
            ))
          ),
          unlocked && React.createElement("div", { className: "controls" },
            React.createElement("div", null, "Incremento: ", [1, 5, 10].map((s) => React.createElement("button", { key: s, className: "chip " + (step === s ? "on" : ""), onClick: () => setStep(s) }, "+", s))),
            React.createElement("button", { className: "ctrl-btn", onClick: () => setShowSettings(true) }, "🔑 Mudar senha"),
            confirmReset ? React.createElement("button", { className: "ctrl-btn", onClick: reset }, "✅ Confirmar") : React.createElement("button", { className: "ctrl-btn", onClick: () => setConfirmReset(true), disabled: users.length === 0 }, "🔄 Limpar")
          ),
          React.createElement("div", { className: "share" }, "🔗 Compartilhe o link. Todos veem. Só ADM edita.")
        ),
        showLogin && React.createElement("div", { className: "overlay", onClick: () => setShowLogin(false) },
          React.createElement("div", { className: "modal", onClick: (e) => e.stopPropagation() },
            React.createElement("div", { style: { fontSize: "32px", marginBottom: "12px" } }, "🔐"),
            React.createElement("h2", null, "Entrar como ADM"),
            React.createElement("input", { className: "modal-in " + (loginError ? "error" : ""), type: "password", placeholder: "Senha", value: loginInput, autoFocus: true, onChange: (e) => { setLoginInput(e.target.value); setLoginError(false); }, onKeyDown: (e) => e.key === "Enter" && tryLogin() }),
            loginError && React.createElement("p", { style: { color: "var(--danger)", fontSize: "12px" } }, "Senha incorreta"),
            React.createElement("div", { className: "modal-actions" },
              React.createElement("button", { className: "btn-primary", onClick: tryLogin }, "🔓 Entrar"),
              React.createElement("button", { className: "btn-ghost", onClick: () => setShowLogin(false) }, "Cancelar")
            )
          )
        ),
        showSettings && React.createElement("div", { className: "overlay", onClick: () => setShowSettings(false) },
          React.createElement("div", { className: "modal", onClick: (e) => e.stopPropagation() },
            React.createElement("div", { style: { fontSize: "32px", marginBottom: "12px" } }, "🔑"),
            React.createElement("h2", null, "Mudar senha"),
            React.createElement("input", { className: "modal-in", type: "password", placeholder: "Nova senha", value: newPinInput, onChange: (e) => setNewPinInput(e.target.value) }),
            React.createElement("input", { className: "modal-in", type: "password", placeholder: "Confirmar", value: newPinConfirm, onChange: (e) => setNewPinConfirm(e.target.value), onKeyDown: (e) => e.key === "Enter" && saveNewPin() }),
            React.createElement("div", { className: "modal-actions" },
              React.createElement("button", { className: "btn-primary", onClick: saveNewPin }, "💾 Salvar"),
              React.createElement("button", { className: "btn-ghost", onClick: () => setShowSettings(false) }, "Cancelar")
            )
          )
        )
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
